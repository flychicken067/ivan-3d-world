<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ivan's World</title>
  <link rel="stylesheet" href="/src/ui/styles.css">
</head>
<body>
  <canvas id="world-canvas"></canvas>
  <div id="ui-layer">
    <div id="hud-zone" class="hud" aria-live="polite"></div>
    <div id="minimap" class="minimap"></div>
    <div id="nav-overlay" class="nav-overlay hidden"></div>
    <div id="panel-overlay" class="panel-overlay hidden"></div>
    <div id="tutorial" class="tutorial-overlay hidden"></div>
    <div id="tour-narration" class="tour-narration hidden">
      <div class="tour-progress"><span class="tour-step">1/7</span> &middot; <span class="tour-zone-name">WELCOME</span></div>
      <div class="tour-text"></div>
      <button class="tour-stop">STOP TOUR</button>
    </div>
    <div class="crosshair"></div>
    <button id="audio-toggle" class="audio-toggle">SOUND ON</button>
  </div>
  <div id="start-screen" class="start-screen">
    <div class="start-content">
      <h1 class="display-title">IVAN'S WORLD</h1>
      <p class="start-tagline">The Builder Who Ships.</p>
      <p class="start-desc">Explore 7 zones — Projects, Soulprint, Theater, Library, Social & more</p>
      <div class="start-controls">
        <span class="start-control-hint desktop-only">WASD Move</span>
        <span class="start-control-sep desktop-only">&middot;</span>
        <span class="start-control-hint desktop-only">Mouse Look</span>
        <span class="start-control-sep desktop-only">&middot;</span>
        <span class="start-control-hint desktop-only">Click Interact</span>
        <span class="start-control-sep desktop-only">&middot;</span>
        <span class="start-control-hint desktop-only">Tab Map</span>
        <span class="start-control-sep desktop-only">&middot;</span>
        <span class="start-control-hint desktop-only">Esc Menu</span>
        <span class="start-control-hint touch-only">Joystick Move</span>
        <span class="start-control-sep touch-only">&middot;</span>
        <span class="start-control-hint touch-only">Swipe Look</span>
        <span class="start-control-sep touch-only">&middot;</span>
        <span class="start-control-hint touch-only">Tap Interact</span>
      </div>
      <div class="start-cta">
        <span class="start-cta-text desktop-only">CLICK TO ENTER</span>
        <span class="start-cta-text touch-only">TAP TO ENTER</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
